<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER-boutiques | Mode Enfantine</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header>
        <nav>
            <div class="logo-container">
                <a href="index.html">
                    <img src="logo.png" alt="ER-boutiques Logo" class="client-logo">
                </a>
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                <i data-lucide="shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Mode Enfantine & Bébé</h2>
            <p>Livraison à Libreville et Ntoum</p>
        </section>

        <div class="products-grid" id="products-container"></div>
    </main>

    <footer>
        <p>&copy; 2026 ER-boutiques. Tous droits réservés.</p>
        <p class="signature">Développé par <strong>NEJ-Dev</strong></p>
    </footer>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Ma Commande</h3>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        <div id="cart-items-list"></div>
        <div class="cart-footer">
            <div class="delivery-form">
                <h4>Livraison</h4>
                <input type="text" id="cust-name" placeholder="Nom complet">
                <input type="tel" id="cust-phone" placeholder="Téléphone">
                <select id="cust-city" onchange="updateQuarters()">
                    <option value="">Choisir la ville</option>
                    <option value="Libreville">Libreville</option>
                    <option value="Ntoum">Ntoum</option>
                </select>
                <select id="cust-quarter">
                    <option value="">Choisir le quartier</option>
                </select>
            </div>
            <div class="total-container">
                <span>Total :</span>
                <span id="cart-total">0</span> FCFA
            </div>
            <button class="btn-whatsapp" onclick="sendOrder()">
                <i data-lucide="message-circle"></i> Commander sur WhatsApp
            </button>
        </div>
    </div>

    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <i data-lucide="check-circle" class="success-icon"></i>
            <h3>Commande prête !</h3>
            <p>Envoi vers le WhatsApp Business (+241 66366683).</p>
            <button class="btn-confirm" onclick="finalWhatsAppRedirect()">Confirmer</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
